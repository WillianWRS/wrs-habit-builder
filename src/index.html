<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>Habit Builder</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Construa hábitos com consistência gentil — local-first, sem conta."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="Habit Builder" />
    <meta
      property="og:description"
      content="Consistência gentil para hábitos que importam. Local-first, sem conta."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/habit-builder-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/habit-builder-icon.png" />
    <link rel="apple-touch-icon" href="/habit-builder-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          if (localStorage.getItem('wrs-habit-builder-theme') === 'light') {
            document.documentElement.classList.remove('dark');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
