<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>Habit Builder</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Construa hábitos com consistência gentil — local-first, sem conta."
    />
    <meta name="theme-color" content="#18181b" />
    <meta name="color-scheme" content="dark" />
    <meta property="og:title" content="Habit Builder" />
    <meta
      property="og:description"
      content="Consistência gentil para hábitos que importam. Local-first, sem conta."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/habit-builder-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="privacy-policy" href="/privacy" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Habit Builder" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="512x512" href="/habit-builder-icon.png" />
    <link rel="apple-touch-icon" href="/habit-builder-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var isLight = localStorage.getItem('wrs-habit-builder-theme') === 'light';
          var root = document.documentElement;

          if (isLight) {
            root.classList.remove('dark');
            root.style.colorScheme = 'only light';
          } else {
            root.classList.add('dark');
            root.style.colorScheme = 'only dark';
          }

          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', isLight ? '#eaeaec' : '#18181b');
          }

          var colorSchemeMeta = document.querySelector('meta[name="color-scheme"]');
          if (colorSchemeMeta) {
            colorSchemeMeta.setAttribute('content', isLight ? 'light' : 'dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'only dark';
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
