<div
  class="habit-card-streak-status shrink-0 text-right"
  [attr.aria-label]="ariaLabel()"
>
  @if (titleSwapActive()) {
    <p class="streak-status-title streak-status-title--swap text-sm font-medium">
      <span class="streak-title-stage" aria-hidden="true">
        <span
          class="streak-title-old"
          [style.animation-duration.ms]="titleSwapHalfMs"
        >
          {{ outgoingTitle() }}
        </span>
        <span
          class="streak-title-new"
          [style.animation-duration.ms]="titleSwapHalfMs"
          [style.animation-delay.ms]="titleSwapHalfMs"
        >
          {{ streakTitle() }}
        </span>
      </span>
      <span class="sr-only">{{ streakTitle() }}</span>
    </p>
  } @else {
    <p class="streak-status-title text-sm font-medium">
      {{ streakTitle() }}
    </p>
  }
</div>
